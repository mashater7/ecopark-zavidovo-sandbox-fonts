<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Poiret One',sans-serif;background:#fff;color:#333;padding:24px 0 60px}
  .row{padding:42px 20px;border-bottom:1px dashed #eee;text-align:center;position:relative}
  .tag{position:absolute;top:12px;left:24px;font-family:Arial;font-size:12px;letter-spacing:.05em;color:#b08;text-transform:uppercase}
  .big{display:inline-block;text-transform:uppercase;font-weight:400;letter-spacing:.2em;line-height:1.05;font-size:46px;
    background:linear-gradient(100deg,#1bad03,#15a06a 45%,#1f9be6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{text-transform:uppercase;letter-spacing:.24em;color:#808080;font-size:13px;margin-top:10px}
  .ln{width:70px;height:1px;background:#15a06a;opacity:.55;margin:0 auto;border:0}
  .lnb{width:70px;height:1px;background:#cdc6ba;margin:0 auto;border:0}
  .dia{display:inline-flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
  .dia .l{width:54px;height:1px;background:#bcd8c6;display:inline-block}
  .dia img{width:18px;height:18px;object-fit:contain}
</style></head><body>

  <div class="row"><div class="tag">A · линия снизу</div>
    <div class="big">Коллекция Завидово</div>
    <div class="sub">Экопарк Завидово · Экопарк Лесной</div>
    <hr class="ln" style="margin-top:18px">
  </div>

  <div class="row"><div class="tag">B · линия сверху</div>
    <hr class="ln" style="margin-bottom:18px">
    <div class="big">Коллекция Завидово</div>
    <div class="sub">Экопарк Завидово · Экопарк Лесной</div>
  </div>

  <div class="row"><div class="tag">C · сверху и снизу (рамка)</div>
    <hr class="ln" style="margin-bottom:18px">
    <div class="big">Коллекция Завидово</div>
    <div class="sub">Экопарк Завидово · Экопарк Лесной</div>
    <hr class="ln" style="margin-top:18px">
  </div>

  <div class="row"><div class="tag">D · линия + бриллиант снизу</div>
    <div class="big">Коллекция Завидово</div>
    <div class="sub">Экопарк Завидово · Экопарк Лесной</div>
    <div class="dia"><span class="l"></span><img src="assets/collection/logo-diamond.png" alt=""><span class="l"></span></div>
  </div>

</body></html>
