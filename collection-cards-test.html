<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Коллекция Завидово — выбор посёлка · Карточки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1bad03; --green-d:#2f6b43; --blue:#007fe2; --blue-l:#3eb5f1;
    --brown:#bb916b; --ink:#333; --ink-soft:#6b6b6b;
    --bg:#f5f2f0; --bg2:#f0f6f4; --card:#fff;
    --grad:linear-gradient(100deg,var(--green) 0%,#15a06a 45%,var(--blue) 100%);
    --font:'Poiret One','Century Gothic',sans-serif; --radius:20px;
    --shadow:0 18px 40px -22px rgba(20,60,40,.45);
    --shadow-lg:0 30px 60px -28px rgba(20,60,40,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--font);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;
    background:radial-gradient(1200px 700px at 85% -5%,var(--bg2),transparent 55%),
      radial-gradient(900px 500px at -10% 110%,#eef6f1,transparent 55%),var(--bg);}

  .head{max-width:1180px;margin:0 auto;padding:52px 24px 14px;text-align:center}
  .head .diamond{width:70px;height:70px;object-fit:contain;margin-bottom:12px}
  .brand{font-size:clamp(26px,4.4vw,46px);letter-spacing:.22em;text-transform:uppercase;font-weight:400;line-height:1.1}
  .brand b{font-weight:400;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tagline{margin-top:12px;font-size:clamp(13px,1.6vw,17px);letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}

  /* переключатель стилей */
  .switch{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:760px;margin:22px auto 0;padding:0 16px}
  .switch button{font-family:var(--font);font-size:13px;letter-spacing:.14em;text-transform:uppercase;
    padding:9px 18px;border-radius:30px;border:1px solid rgba(0,0,0,.12);background:#fff;color:#6a6a6a;
    cursor:pointer;transition:.22s;white-space:nowrap}
  .switch button:hover{color:#111;box-shadow:0 8px 16px -10px rgba(0,0,0,.35)}
  .switch button.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 10px 22px -10px rgba(20,90,60,.5)}
  .switch .hint{flex-basis:100%;text-align:center;font-size:12px;letter-spacing:.1em;color:#9a9a9a;margin-top:4px}

  .stage{max-width:1180px;margin:0 auto;padding:30px 24px 70px}

  /* общие */
  .vkicker{font-size:11.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--brown)}
  .vname{font-weight:400;text-transform:uppercase;letter-spacing:.12em}
  .btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--font);font-size:14px;
    letter-spacing:.16em;text-transform:uppercase;padding:12px 22px;border-radius:40px;color:#fff;
    background:var(--grad);text-decoration:none;transition:gap .25s,filter .25s}
  .btn--ghost{background:none;color:var(--green-d);border:1.5px solid rgba(47,107,67,.4)}

  /* ===== Минимал ===== */
  .mi{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
  .mcard{position:relative;border-radius:var(--radius);background:var(--card);padding:36px 32px 32px;overflow:hidden;
    text-decoration:none;color:inherit;border:1px solid rgba(0,0,0,.07);box-shadow:0 14px 34px -26px rgba(20,60,40,.5);
    transition:transform .35s,box-shadow .35s;display:flex;flex-direction:column;min-height:360px}
  .mcard::before{content:"";position:absolute;inset:0;border-radius:var(--radius);padding:1.5px;
    background:var(--grad);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .35s}
  .mcard:hover{transform:translateY(-8px);box-shadow:var(--shadow)}
  .mcard:hover::before{opacity:1}
  .mcard--flag::before{opacity:.5}
  .mcard .wm{position:absolute;right:-24px;bottom:-28px;width:160px;height:160px;opacity:.10;
    transition:opacity .35s,transform .5s;pointer-events:none}
  .mcard:hover .wm{opacity:.18;transform:scale(1.06) rotate(-4deg)}
  .mcard .badge{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:#f3f7f4;margin-bottom:20px}
  .mcard .badge img{width:36px;height:36px;object-fit:contain}
  .mcard .ribbon{position:absolute;top:22px;right:22px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:#fff;background:var(--brown);padding:6px 13px;border-radius:30px}
  .mcard .vname{font-size:34px;margin-top:2px}
  .mcard .vdesc{margin:14px 0 24px;color:var(--ink-soft);font-size:15.5px;flex:1}
  .mcard .btn{align-self:flex-start}
  .mcard:hover .btn{gap:15px;border-color:transparent;color:#fff;background:var(--grad)}

  /* ===== Стекло ===== */
  .glass{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .gcard{position:relative;aspect-ratio:3/4;border-radius:22px;overflow:hidden;text-decoration:none;color:#fff;
    box-shadow:var(--shadow);transition:transform .35s;display:block}
  .gcard:hover{transform:translateY(-7px)}
  .gcard > img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .6s}
  .gcard:hover > img{transform:scale(1.06)}
  .gcard::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,30,20,.05),rgba(10,30,20,.4))}
  .gpanel{position:absolute;left:14px;right:14px;bottom:14px;z-index:2;padding:18px 18px 20px;border-radius:16px;
    background:rgba(255,255,255,.18);backdrop-filter:blur(14px) saturate(1.2);border:1px solid rgba(255,255,255,.35);
    box-shadow:0 10px 30px -14px rgba(0,0,0,.4)}
  .gpanel .vkicker{color:#eafff0;opacity:.95}
  .gpanel .vname{font-size:27px;text-shadow:0 2px 10px rgba(0,0,0,.3)}
  .gpanel .vdesc{margin-top:9px;font-size:13.5px;line-height:1.5;color:#f3fff7;opacity:.95;text-shadow:0 1px 6px rgba(0,0,0,.3)}
  .gpanel .badge{position:absolute;top:-26px;right:16px;width:48px;height:48px;border-radius:50%;
    background:rgba(255,255,255,.95);display:grid;place-items:center;box-shadow:0 8px 18px -8px rgba(0,0,0,.5)}
  .gpanel .badge img{width:30px;height:30px;object-fit:contain}
  .gpanel .row{display:flex;align-items:center;justify-content:flex-end;margin-top:13px}
  .gpanel .go{font-size:13px;letter-spacing:.14em;text-transform:uppercase;display:inline-flex;gap:8px;align-items:center}

  /* ===== Журнал ===== */
  .ed{display:flex;flex-direction:column;gap:22px}
  .ecard{display:grid;grid-template-columns:1.05fr 1fr;background:var(--card);border-radius:20px;overflow:hidden;
    box-shadow:var(--shadow);text-decoration:none;color:inherit;border:1px solid rgba(0,0,0,.04);transition:box-shadow .35s,transform .35s}
  .ecard:hover{box-shadow:var(--shadow-lg);transform:translateY(-4px)}
  .ecard:nth-child(even){grid-template-columns:1fr 1.05fr}
  .ecard:nth-child(even) .ecard__media{order:2}
  .ecard__media{position:relative;min-height:280px;overflow:hidden}
  .ecard__media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .6s}
  .ecard:hover .ecard__media img{transform:scale(1.05)}
  .ecard__body{padding:38px 40px;display:flex;flex-direction:column;justify-content:center}
  .ecard__idx{font-size:46px;color:#e3ded8;line-height:1;margin-bottom:8px}
  .ecard .vname{font-size:38px;margin-top:4px}
  .ecard .vdesc{margin:16px 0 22px;color:var(--ink-soft);font-size:16px;max-width:42ch}
  .ecard .badge{width:46px;height:46px;margin-bottom:6px}
  .ecard .badge img{width:46px;height:46px;object-fit:contain}

  /* ===== Бенто ===== */
  .bento{display:grid;grid-template-columns:1.4fr 1fr;grid-template-rows:1fr 1fr;gap:20px;min-height:520px}
  .bcard{position:relative;border-radius:20px;overflow:hidden;text-decoration:none;color:#fff;box-shadow:var(--shadow);transition:transform .35s;display:block}
  .bcard:hover{transform:translateY(-6px)}
  .bcard > img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .6s}
  .bcard:hover > img{transform:scale(1.06)}
  .bcard::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,30,20,.12),rgba(10,30,20,.6))}
  .bcard--big{grid-row:1 / span 2}
  .bcard__in{position:absolute;z-index:2;left:0;right:0;bottom:0;padding:24px 26px}
  .bcard .badge{position:absolute;z-index:2;top:18px;left:18px;width:46px;height:46px;border-radius:50%;
    background:rgba(255,255,255,.95);display:grid;place-items:center;box-shadow:0 6px 16px -8px rgba(0,0,0,.5)}
  .bcard .badge img{width:28px;height:28px;object-fit:contain}
  .bcard .vkicker{color:#eafff0}
  .bcard .vname{font-size:26px;text-shadow:0 2px 10px rgba(0,0,0,.35)}
  .bcard--big .vname{font-size:40px}
  .bcard .vdesc{margin-top:8px;font-size:14px;opacity:.92;max-width:34ch}
  .bcard .ribbon{position:absolute;z-index:2;top:18px;right:18px;font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;color:#fff;background:var(--brown);padding:6px 13px;border-radius:30px}

  /* ===== Афиша ===== */
  .fb{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .fcard{position:relative;aspect-ratio:4/5;border-radius:20px;overflow:hidden;text-decoration:none;color:#fff;
    box-shadow:var(--shadow);transition:transform .35s;display:block}
  .fcard:hover{transform:translateY(-7px)}
  .fcard > img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .7s;filter:saturate(.95)}
  .fcard:hover > img{transform:scale(1.07)}
  .fcard::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,30,20,0) 35%,rgba(10,28,20,.78) 100%)}
  .fcard__in{position:absolute;z-index:2;left:0;right:0;bottom:0;padding:26px 26px 28px;text-align:center}
  .fcard .badge{width:56px;height:56px;border-radius:50%;margin:0 auto 12px;background:rgba(255,255,255,.95);
    display:grid;place-items:center;box-shadow:0 8px 20px -8px rgba(0,0,0,.6)}
  .fcard .badge img{width:34px;height:34px;object-fit:contain}
  .fcard .vname{font-size:30px;text-shadow:0 2px 12px rgba(0,0,0,.4)}
  .fcard .vdesc{max-height:0;opacity:0;overflow:hidden;transition:max-height .45s,opacity .4s;margin-top:0}
  .fcard:hover .vdesc{max-height:120px;opacity:1;margin-top:10px}
  .fcard .vdesc p{font-size:14px;opacity:.95}
  .fcard .go{margin-top:14px;display:inline-flex;gap:8px;font-size:13px;letter-spacing:.14em;text-transform:uppercase}

  .foot{text-align:center;padding:0 24px 56px;color:#9a9a9a;font-size:13px;letter-spacing:.12em}

  @media (max-width:900px){
    .mi,.glass,.fb,.bento{grid-template-columns:1fr;grid-template-rows:none;min-height:0;max-width:440px;margin:0 auto;gap:20px}
    .mcard{min-height:0}

    /* фото-карточки: крупное портретное фото + место под текст */
    .gcard,.fcard,.bcard,.bcard--big{aspect-ratio:4/5;grid-row:auto}

    /* СТЕКЛО: панель компактнее, фото крупнее */
    .gpanel{left:12px;right:12px;bottom:12px;padding:16px 16px 18px}
    .gpanel .vname{font-size:26px}
    .gpanel .vdesc{font-size:14px}

    /* АФИША: сильный скрим, текст читается, без наездов */
    .fcard::after{background:linear-gradient(180deg,rgba(10,30,20,0) 28%,rgba(8,26,18,.88) 100%)}
    .fcard__in{padding:22px 22px 26px}
    .fcard .vname{font-size:28px}
    .fcard .vdesc{max-height:160px;opacity:1;margin-top:10px}

    /* БЕНТО: ровные крупные фото-карточки, усиленный скрим */
    .bcard::after{background:linear-gradient(180deg,rgba(10,30,20,.05) 32%,rgba(8,26,18,.82) 100%)}
    .bcard .vname,.bcard--big .vname{font-size:27px}
    .bcard__in{padding:20px 22px 24px}

    /* ЖУРНАЛ: фото крупнее, аккуратные отступы */
    .ecard,.ecard:nth-child(even){grid-template-columns:1fr}
    .ecard:nth-child(even) .ecard__media{order:0}
    .ecard__media{min-height:240px}
    .ecard__body{padding:26px 24px}
    .ecard__idx{font-size:40px}
    .ecard .vname{font-size:32px}
  }
</style>
</head>
<body>

  <header class="head">
    <img class="diamond" src="assets/collection/logo-diamond.png" alt="">
    <h1 class="brand">Коллекция <b>Завидово</b></h1>
    <div class="tagline">выберите свой посёлок</div>
    <div class="switch" id="switch">
      <button data-s="minimal" class="active">Минимал</button>
      <button data-s="glass">Стекло</button>
      <button data-s="ed">Журнал</button>
      <button data-s="bento">Бенто</button>
      <button data-s="fb">Афиша</button>
      <span class="hint">↑ переключите стиль карточек</span>
    </div>
  </header>

  <main class="stage"><div id="render"></div></main>

  <div class="foot">КОЛЛЕКЦИЯ ЗАВИДОВО · пример лендинга · карточки с переключателем стиля</div>

<script>
  var V=[
    {key:"lesnoy",kicker:"экопарк",name:"Лесной",href:"#lesnoy",flag:false,
     desc:"Уединённые коттеджи в сосновом бору. Тишина и природа в шаге от дома.",
     img:"assets/collection/photo-lesnoy.jpg",logo:"assets/collection/logo-lesnoy.png"},
    {key:"zavidovo",kicker:"экопарк · флагман",name:"Завидово",href:"#zavidovo",flag:true,
     desc:"Сердце курорта: гольф, спа, рестораны и вся инфраструктура.",
     img:"assets/collection/photo-zavidovo.jpg",logo:"assets/collection/logo-zavidovo.png"},
    {key:"akvatoriya",kicker:"акватория",name:"Акватория",href:"#akvatoriya",flag:false,
     desc:"Жизнь у воды: дома на берегу водохранилища, собственный пляж и причал.",
     img:"assets/collection/photo-akvatoriya.jpg",logo:"assets/collection/logo-akvatoriya.png"}
  ];

  function minimal(){
    return ['mi', V.map(function(v){return ''+
      '<a class="mcard'+(v.flag?' mcard--flag':'')+'" href="'+v.href+'">'+
      (v.flag?'<span class="ribbon">флагман</span>':'')+
      '<img class="wm" src="'+v.logo+'" alt="">'+
      '<span class="badge"><img src="'+v.logo+'" alt=""></span>'+
      '<div class="vkicker">'+(v.flag?'экопарк':v.kicker)+'</div><div class="vname">'+v.name+'</div>'+
      '<p class="vdesc">'+v.desc+'</p><span class="btn btn--ghost">Выбрать →</span></a>';}).join('')];
  }
  function glass(){
    return ['glass', V.map(function(v){return ''+
      '<a class="gcard" href="'+v.href+'"><img src="'+v.img+'" alt="'+v.name+'">'+
      '<div class="gpanel"><span class="badge"><img src="'+v.logo+'" alt=""></span>'+
      '<div class="vkicker">'+v.kicker+'</div><div class="vname">'+v.name+'</div>'+
      '<p class="vdesc">'+v.desc+'</p><div class="row"><span class="go">Выбрать →</span></div></div></a>';}).join('')];
  }
  function editorial(){
    return ['ed', V.map(function(v,i){return ''+
      '<a class="ecard" href="'+v.href+'"><div class="ecard__media"><img src="'+v.img+'" alt="'+v.name+'"></div>'+
      '<div class="ecard__body"><div class="ecard__idx">0'+(i+1)+'</div>'+
      '<span class="badge"><img src="'+v.logo+'" alt=""></span>'+
      '<div class="vkicker">'+v.kicker+'</div><div class="vname">'+v.name+'</div>'+
      '<p class="vdesc">'+v.desc+'</p><span class="btn btn--ghost">Перейти в посёлок →</span></div></a>';}).join('')];
  }
  function bento(){
    var order=[V[1],V[0],V[2]];
    return ['bento', order.map(function(v,i){return ''+
      '<a class="bcard'+(i===0?' bcard--big':'')+'" href="'+v.href+'"><img src="'+v.img+'" alt="'+v.name+'">'+
      '<span class="badge"><img src="'+v.logo+'" alt=""></span>'+
      (v.flag?'<span class="ribbon">флагман</span>':'')+
      '<div class="bcard__in"><div class="vkicker">'+v.kicker+'</div><div class="vname">'+v.name+'</div>'+
      (i===0?'<p class="vdesc">'+v.desc+'</p>':'')+'</div></a>';}).join('')];
  }
  function fullbleed(){
    return ['fb', V.map(function(v){return ''+
      '<a class="fcard" href="'+v.href+'"><img src="'+v.img+'" alt="'+v.name+'">'+
      '<div class="fcard__in"><span class="badge"><img src="'+v.logo+'" alt=""></span>'+
      '<div class="vkicker">'+v.kicker+'</div><div class="vname">'+v.name+'</div>'+
      '<div class="vdesc"><p>'+v.desc+'</p></div><div class="go">Выбрать →</div></div></a>';}).join('')];
  }
  var FN={minimal:minimal,glass:glass,ed:editorial,bento:bento,fb:fullbleed};
  var render=document.getElementById('render');
  function set(style){
    var r=FN[style](); render.className=r[0]; render.innerHTML=r[1];
    document.querySelectorAll('.switch button').forEach(function(b){b.classList.toggle('active',b.dataset.s===style);});
  }
  document.querySelectorAll('.switch button').forEach(function(b){
    b.addEventListener('click',function(){set(b.dataset.s);});
  });
  set('minimal');
</script>
</body>
</html>
