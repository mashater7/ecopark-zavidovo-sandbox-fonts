<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Шапка «Коллекция Завидово» — красивая, в стиле сплит-экрана</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1bad03; --green-d:#09763F; --blue:#007fe2; --brown:#bb916b;
    --grad:linear-gradient(100deg,#2ec24f,#15a06a 45%,#1f9be6);
    --font:'Poiret One','Century Gothic',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:#fff;background:#0f231b;-webkit-font-smoothing:antialiased}

  /* ——— ПРАВКА 2: красивая полноэкранная шапка «Коллекция Завидово» ——— */
  .collhero{position:relative;min-height:88vh;display:flex;flex-direction:column;overflow:hidden}
  .collhero__bg{position:absolute;inset:0;background:url('assets/collection/photo-zavidovo.jpg') center/cover no-repeat;
    transform:scale(1.04);animation:slowzoom 18s ease-in-out infinite alternate}
  @keyframes slowzoom{to{transform:scale(1.12)}}
  .collhero::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(8,22,16,.55) 0%,rgba(8,22,16,.30) 38%,rgba(8,22,16,.72) 100%)}

  /* шапка-навигация поверх фото */
  .nav{position:relative;z-index:3;max-width:1280px;width:100%;margin:0 auto;
    padding:24px 30px;display:flex;align-items:center;gap:24px}
  .brand{display:inline-flex;align-items:center;text-decoration:none;flex:0 0 auto}
  .brand img{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 3px 10px rgba(0,0,0,.45));transition:transform .25s}
  .brand:hover img{transform:scale(1.08) rotate(-3deg)}
  .menu{margin-left:auto;display:flex;align-items:center;gap:30px}
  .menu a{color:#fff;text-decoration:none;font-size:15px;letter-spacing:.04em;opacity:.9}
  .menu a:hover{opacity:1;text-shadow:0 2px 10px rgba(0,0,0,.5)}
  .phone{color:#fff;text-decoration:none;font-size:21px;white-space:nowrap;text-shadow:0 2px 10px rgba(0,0,0,.45)}
  .phone small{display:block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;opacity:.8;text-align:right;margin-top:2px}

  /* центр — герой коллекции */
  .collhero__in{position:relative;z-index:3;flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:40px 24px 70px}
  .emblem{width:84px;height:84px;border-radius:50%;background:rgba(255,255,255,.94);
    display:grid;place-items:center;margin-bottom:26px;box-shadow:0 16px 40px -14px rgba(0,0,0,.6)}
  .emblem img{width:50px;height:50px;object-fit:contain}
  .collhero h1{font-weight:400;text-transform:uppercase;letter-spacing:.24em;line-height:1.04;
    font-size:clamp(34px,6.4vw,78px);
    background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 18px rgba(0,0,0,.35))}
  .collhero .sub{margin-top:16px;font-size:clamp(12px,1.6vw,17px);letter-spacing:.34em;text-transform:uppercase;
    color:#eafff0;opacity:.95;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .collhero .rule{width:64px;height:2px;margin:26px auto 0;border-radius:2px;background:var(--grad)}
  .cta{margin-top:34px;display:inline-flex;align-items:center;gap:11px;font-family:var(--font);cursor:pointer;
    font-size:15px;letter-spacing:.16em;text-transform:uppercase;padding:15px 36px;border-radius:44px;
    color:#fff;background:var(--grad);text-decoration:none;box-shadow:0 16px 36px -14px rgba(0,120,80,.7);transition:gap .25s,filter .25s}
  .cta:hover{gap:17px;filter:brightness(1.08)}

  .scrollcue{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);z-index:3;
    color:#fff;opacity:.8;font-size:12px;letter-spacing:.2em;text-transform:uppercase;text-align:center}
  .scrollcue svg{display:block;margin:8px auto 0;width:22px;height:22px;animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

  /* подсказка под шапкой (только для демо) — показывает, что ниже идёт обычный сайт */
  .below{background:#fff;color:#9a948c;text-align:center;padding:26px 20px;font-size:13px;letter-spacing:.12em;text-transform:uppercase}

  @media (max-width:820px){
    .menu{display:none}
    .nav{padding:18px 18px}
    .phone{margin-left:auto;font-size:17px}
    .collhero{min-height:82vh}
    .collhero h1{letter-spacing:.16em}
    .collhero .sub{letter-spacing:.24em}
  }
</style>
</head>
<body>

  <section class="collhero">
    <div class="collhero__bg"></div>

    <header class="nav">
      <!-- правка 1: бриллиант вместо текст-лого, ведёт в Коллекцию (сплит-экран) -->
      <a class="brand" href="collection-split-test.html" title="Коллекция Завидово">
        <img src="assets/collection/logo-diamond.png" alt="Коллекция Завидово">
      </a>
      <nav class="menu">
        <a href="#">О посёлке</a><a href="#">Инфраструктура</a><a href="#">Участки</a>
        <a href="#">Активности</a><a href="#">Новости</a><a href="#">FAQ</a>
      </nav>
      <a class="phone" href="tel:+74993096541">+7 499 309 65 41<small>звонок бесплатный</small></a>
    </header>

    <div class="collhero__in">
      <div class="emblem"><img src="assets/collection/logo-diamond.png" alt=""></div>
      <h1>Коллекция Завидово</h1>
      <div class="sub">Экопарк Завидово&nbsp;·&nbsp;Экопарк Лесной</div>
      <div class="rule"></div>
      <a class="cta" href="collection-split-test.html">Выбрать посёлок →</a>
    </div>

    <div class="scrollcue">листайте вниз
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </section>

  <div class="below">↓ ниже идёт обычный сайт (участки, инфраструктура, FAQ…) — его не трогаем</div>

</body>
</html>
