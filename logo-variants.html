<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Текстовый логотип «Коллекция Завидово» — варианты</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
<style>
  :root{--grad:linear-gradient(100deg,#1bad03,#15a06a 45%,#1f9be6);--green:#15a06a;--blue:#1f9be6;--grey:#9a948c}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Poiret One',sans-serif;background:#fff;color:#333;padding:30px 0 70px}
  .row{display:flex;align-items:center;gap:18px;padding:34px 40px;border-bottom:1px solid #f0ece5;max-width:760px;margin:0 auto}
  .tag{position:relative;min-width:160px;font-family:Arial;font-size:12px;letter-spacing:.04em;color:#b08;text-transform:uppercase;line-height:1.4}
  .tag b{display:block;font-size:13px;color:#444;margin-bottom:2px}
  .lock{display:inline-flex;align-items:center;gap:15px}
  .lock>img{width:62px;height:62px;object-fit:contain;flex:none}
  .wm{display:flex;flex-direction:column;line-height:1}
  .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  /* V1 баланс */
  .v1 .a{font-size:15px;letter-spacing:.46em;text-transform:uppercase}
  .v1 .b{font-size:27px;letter-spacing:.2em;text-transform:uppercase;margin-top:3px}
  /* V2 кикер */
  .v2 .a{font-size:11.5px;letter-spacing:.44em;text-transform:uppercase;color:var(--grey)}
  .v2 .b{font-size:30px;letter-spacing:.13em;text-transform:uppercase;margin-top:4px}
  /* V3 два цвета */
  .v3 .a{font-size:17px;letter-spacing:.34em;text-transform:uppercase;color:var(--green)}
  .v3 .b{font-size:25px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-top:2px}
  /* V4 с линией */
  .v4 .a{font-size:13px;letter-spacing:.5em;text-transform:uppercase}
  .v4 .ln{height:1px;background:var(--grad);opacity:.55;margin:6px 0 5px;width:100%}
  .v4 .b{font-size:25px;letter-spacing:.22em;text-transform:uppercase}
  /* V5 засечка-разрядка одинаковой ширины */
  .v5 .a{font-size:13.5px;letter-spacing:.62em;text-transform:uppercase;color:var(--grey)}
  .v5 .b{font-size:26px;letter-spacing:.205em;text-transform:uppercase;margin-top:3px}
</style></head><body>

  <div class="row v1"><div class="tag"><b>Вариант 1</b>баланс · оба градиент</div>
    <a class="lock"><img src="assets/collection/logo-diamond.png" alt=""><span class="wm"><span class="a grad">Коллекция</span><span class="b grad">Завидово</span></span></a>
  </div>

  <div class="row v2"><div class="tag"><b>Вариант 2</b>кикер · «коллекция» мелко серым</div>
    <a class="lock"><img src="assets/collection/logo-diamond.png" alt=""><span class="wm"><span class="a">Коллекция</span><span class="b grad">Завидово</span></span></a>
  </div>

  <div class="row v3"><div class="tag"><b>Вариант 3</b>два цвета (зелёный + синий)</div>
    <a class="lock"><img src="assets/collection/logo-diamond.png" alt=""><span class="wm"><span class="a">Коллекция</span><span class="b">Завидово</span></span></a>
  </div>

  <div class="row v4"><div class="tag"><b>Вариант 4</b>с тонкой линией между</div>
    <a class="lock"><img src="assets/collection/logo-diamond.png" alt=""><span class="wm"><span class="a grad">Коллекция</span><span class="ln"></span><span class="b grad">Завидово</span></span></a>
  </div>

  <div class="row v5"><div class="tag"><b>Вариант 5</b>«коллекция» разрядкой в ширину «Завидово»</div>
    <a class="lock"><img src="assets/collection/logo-diamond.png" alt=""><span class="wm"><span class="a">Коллекция</span><span class="b grad">Завидово</span></span></a>
  </div>

</body></html>
