<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Коллекция Завидово — варианты вилки выбора</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
<style>
  :root{--grad:linear-gradient(100deg,#1bad03,#15a06a 45%,#007fe2);--brown:#bb916b;--ink:#333;
    --font:'Poiret One','Century Gothic',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);background:#f5f2f0;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 22px;gap:30px}
  img.d{width:80px;height:80px;object-fit:contain}
  h1{font-size:clamp(26px,5vw,44px);letter-spacing:.2em;text-transform:uppercase;font-weight:400;text-align:center}
  h1 b{font-weight:400;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  p.sub{letter-spacing:.16em;text-transform:uppercase;color:#777;font-size:14px;text-align:center;margin-top:-14px}
  .list{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:820px;width:100%}
  a.opt{display:flex;flex-direction:column;gap:6px;padding:24px 22px;border-radius:16px;background:#fff;
    text-decoration:none;color:inherit;box-shadow:0 16px 36px -22px rgba(20,60,40,.5);
    border:1px solid rgba(0,0,0,.05);transition:transform .3s,box-shadow .3s}
  a.opt:hover{transform:translateY(-6px);box-shadow:0 26px 48px -24px rgba(20,60,40,.55)}
  .n{font-size:13px;letter-spacing:.22em;color:var(--brown);text-transform:uppercase}
  .t{font-size:22px;letter-spacing:.06em;text-transform:uppercase}
  .x{color:#888;font-size:14px}
  @media (max-width:720px){.list{grid-template-columns:1fr;max-width:420px}}
</style>
</head>
<body>
  <img class="d" src="assets/collection/logo-diamond.png" alt="">
  <h1>Коллекция <b>Завидово</b></h1>
  <p class="sub">вилка выбора посёлка · 3 варианта</p>
  <div class="list">
    <a class="opt" href="collection-split-test.html"><span class="n">финал</span><span class="t">Сплит-экран</span><span class="x">три раскрывающиеся панели</span></a>
    <a class="opt" href="collection-map-v2-test.html"><span class="n">финал</span><span class="t">Карта</span><span class="x">красивая карта с реальным расположением</span></a>
    <a class="opt" href="collection-cards-styles-test.html"><span class="n">выбор стиля</span><span class="t">Стили карточек</span><span class="x">5 стилей: стекло · журнал · минимал · бенто · афиша</span></a>
  </div>
</body>
</html>
